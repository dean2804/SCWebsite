# To better understand this file read this:
# https://docs.ionos.space/docs/github-actions-customization/

name: "Deploy Now: Execute Build"

on:
  workflow_call:
    inputs:
      site-url:
        required: true
        type: string
      branch-id:
        required: true
        type: string

env:
  DEPLOYMENT_FOLDER: .next/standalone

jobs:
# Please do not rename this job
  build-project:
    name: build SCWebsite
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: v22.x

      - name: Build Node assets
        run: npm ci

      - name: Run script
        env:
          RESEND_API_KEY: re_hBKaEoL5_FALM2ZqidmkxfF1MmPb4W16L
          SITE_URL: ${{ inputs.site-url }}
        run: npm run build

      - name: Prepare standalone deployment
        run: |
          mkdir -p .next/standalone/public .next/standalone/.next/static
          cp -r public/. .next/standalone/public/
          cp -r .next/static/. .next/standalone/.next/static/
          echo '{"scripts":{"start":"node server.js"}}' > .next/standalone/package.json

          # Compress images to reduce size
          sudo apt-get install -y -q jpegoptim optipng
          find .next/standalone/public -name "*.jpg" -o -name "*.jpeg" | xargs jpegoptim --max=82 --strip-all 2>/dev/null || true
          find .next/standalone/public -name "*.png" | xargs optipng -quiet -o2 2>/dev/null || true

          # Strip unnecessary files from node_modules
          find .next/standalone/node_modules -name "*.md" -type f -delete
          find .next/standalone/node_modules -name "*.map" -type f -delete
          find .next/standalone/node_modules -name "*.d.ts" -type f -delete
          find .next/standalone/node_modules -name "LICENSE*" -type f -delete
          find .next/standalone/node_modules -name "CHANGELOG*" -type f -delete
          find .next/standalone/node_modules -name "CHANGES*" -type f -delete
          find .next/standalone/node_modules -name "AUTHORS*" -type f -delete
          find .next/standalone/node_modules -name "__tests__" -type d -exec rm -rf {} + 2>/dev/null || true
          find .next/standalone/node_modules -name "test" -type d -exec rm -rf {} + 2>/dev/null || true
          find .next/standalone/node_modules -name "tests" -type d -exec rm -rf {} + 2>/dev/null || true
          find .next/standalone/node_modules -name "docs" -type d -exec rm -rf {} + 2>/dev/null || true
          find .next/standalone/node_modules -name "examples" -type d -exec rm -rf {} + 2>/dev/null || true

          echo "=== Deployment folder size after optimization ==="
          du -sh .next/standalone
          du -sh .next/standalone/* 2>/dev/null || true

# Please do not touch the following action
      - name: Store deployment content
        uses: ionos-deploy-now/artifact-action@v1
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-eu.ionos.space
          project-id: 9870e816-7152-4c98-bdb2-b8095abeb74c
          branch-id: ${{ inputs.branch-id }}
          version: ${{ github.sha }}
          folder: ${{ env.DEPLOYMENT_FOLDER }}
          config-file: .deploy-now/SCWebsite/config.yaml
          action: upload
